name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual trigger from the "Actions" tab

permissions:
  contents: write # Important for creating releases

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ImgCraft-Windows.zip
          - os: macos-latest
            artifact_name: ImgCraft-macOS-Arm64.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --name ImgCraft --add-data "app/styles.css;app" app/main.py
          cd dist
          powershell Compress-Archive -Path ImgCraft.exe -DestinationPath ../ImgCraft-Windows.zip

      - name: Build with PyInstaller (macOS Arm64)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed --name ImgCraft --add-data "app/styles.css:app" app/main.py
          cd dist
          zip -r ../ImgCraft-macOS-Arm64.zip ImgCraft.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ImgCraft-Windows.zip
            ImgCraft-macOS-Arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
